<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
</head>

<body>
  <button id="rock-button">Rock</button>
  <button id="paper-button">Paper</button>
  <button id="scissors-button">Scissors</button>

  <div>
    <h1>Result:</h1>
    <span id="player-selection">Player: none</span>
    <span id="computer-selection">CPU: none</span>
    <p id="message">Try it out!</p>
    <br>
    <h2>Score:</h2>
    <span>Player: </span>
    <span id="player-score">0</span>
    <br>
    <span>CPU: </span>
    <span id="computer-score">0</span>
  </div>
  <script src="script.js"></script>
</body>

</html>
